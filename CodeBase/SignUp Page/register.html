<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar my-custom-navbar" >
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="landing.html">PantriHub logo here</a>

            <div class="d-flex gap-5">
                <a class="custom-link" href="home.html">Home</a>
                <a class="custom-link" href="about.html">About Us</a>
                <a class="custom-link" href="inventory.html">Inventory</a>
                <a class="custom-link" href="account.html">Account</a>
            </div>

        </div>
    </nav>

    <div class="container mt-5">
        <div class="row my-wrapper shadow-lg rounded-4 overflow-hidden">

            <div class="col-6 my-left-panel d-flex align-items-center justify-content-center text-center">
                <div class="p-4 text-white">
                    <h1>Join PantriHub</h1>
                    <p>
                        Register your organization to manage food resources,
                        get support, and connect with the community.
                    </p>
                </div>
            </div>

            <div class="col-6 my-right-panel d-flex align-items-center justify-content-center">
                <div class="my-form-card w-100">

                    <h2 class="my-form-title text-center mb-3">Register</h2>

                    <form>
                        <div class="mb-3">
                            <label>Organization Name</label>
                            <input type="text" class="form-control my-custom-input" placeholder="Enter organization name">
                        </div>

                        <div class="mb-3">
                            <label>Contact Person</label>
                            <input type="text" class="form-control my-custom-input" placeholder="Enter contact person name">
                        </div>

                        <div class="mb-3">
                            <label>Phone Number</label>
                            <input type="text" class="form-control my-custom-input" placeholder="Enter phone number">
                        </div>

                        <div class="mb-3">
                            <label>Address</label>
                            <input type="text" class="form-control my-custom-input" placeholder="Enter address">
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control my-custom-input" placeholder="Enter email">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" class="form-control my-custom-input" placeholder="Enter password">
                        </div>

                        <div class="mb-4">
                            <label>Confirm Password</label>
                            <input type="password" class="form-control my-custom-input" placeholder="Confirm password">
                        </div>

                        <button type="submit" class="btn custom-btn-green w-100 mb-3">
                            Register
                        </button>

                        <p class="text-center">
                            Already have an account?
                            <a href="login.html" class="my-link">Sign in</a>
                        </p>
                    </form>

                </div>
            </div>

        </div>
    </div>

</body>
</html>
