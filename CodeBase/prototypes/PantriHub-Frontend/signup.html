<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PantriHub Home</title>
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

  <nav class="navbar my-custom-navbar" >
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="home.html"><img src = "assets/img/logo.png"></a>

            <div class="d-flex gap-5">
                <a class="custom-link" href="home.html">Home</a>
                <a class="custom-link" href="about.html">About Us</a>
                <a class="custom-link" href="inventory.html">Inventory</a>
                <a class="custom-link" href="account.html">Account</a>
            </div>
            <div class="nav-search-wrapper">
              <input type="text" placeholder="Search..." class="nav-search-input">

              <span class="search-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                </svg>
              </span>
            </div>
        </div>
    </nav>
<body>
    <div class="container mt-5">
        <div class="row my-wrapper shadow-lg rounded-4 overflow-hidden">

            <div class="col-6 my-left-panel d-flex align-items-center justify-content-center text-center">
                <div class="p-4 text-white">
                    <h1>Create Your Account</h1>
                    <p>
                        Sign up to connect your organization, manage inventory,
                        and support your community.
                    </p>
                </div>
            </div>

            <div class="col-6 my-right-panel d-flex align-items-center justify-content-center">
                <div class="my-form-card w-100">

                    <h2 class="my-form-title text-center mb-3">Sign Up</h2>

                    <form>

                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" class="form-control my-custom-input" placeholder="Enter your name">
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control my-custom-input" placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" class="form-control my-custom-input" placeholder="Enter password">
                        </div>

                        <div class="mb-4">
                            <label>Confirm Password</label>
                            <input type="password" class="form-control my-custom-input" placeholder="Confirm password">
                        </div>

                        <button type="submit" class="btn custom-btn-green w-100 mb-3">
                            Sign Up
                        </button>

                        <p class="text-center">
                            Already have an account?
                            <a href="login.html" class="my-link">Sign in</a>
                        </p>

                    </form>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
