<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Add New Inventory Item:</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label for="recipient-name" class="col-form-label">Item Name:</label>
            <input type="text" class="form-control" id="item-input">
          </div>
          <div class="mb-3">
            <label for="recipient-name" class="col-form-label">Description:</label>
            <input type="text" class="form-control" id="description-input">
          </div>
          <div class="mb-3">
            <label for="recipient-name" class="col-form-label">Organization:</label>
            <input type="text" class="form-control" id="organization-input">
          </div>
          <div class="mb-3">
            <label for="recipient-name" class="col-form-label">Category:</label>
            <input type="text" class="form-control" id="category-input">
          </div>
          <div class="mb-3">
            <label for="recipient-name" class="col-form-label">Location:</label>
            <input type="text" class="form-control" id="location-input">
          </div>
          <div class="mb-3">
            <label for="recipient-name" class="col-form-label">Expiry Date:</label>
            <input type="text" class="form-control" id="expirydate-input">
          </div>
          <div class="mb-3">
            <label for="message-text" class="col-form-label">Message:</label>
            <textarea class="form-control" id="message-text"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-success" id="addItemBtn" >Add Item</button>
      </div>
    </div>
  </div>
</div>
