<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PantriHub Home</title>
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

  <nav class="navbar my-custom-navbar" >
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="home.html"><img src = "assets/img/logo.png"></a>

            <div class="d-flex gap-5">
                <a class="custom-link" href="home.html">Home</a>
                <a class="custom-link" href="about.html">About Us</a>
                <a class="custom-link" href="inventory.html">Inventory</a>
                <a class="custom-link" href="account.html">Account</a>
            </div>
            <div class="nav-search-wrapper">
              <input type="text" placeholder="Search..." class="nav-search-input">

              <span class="search-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                </svg>
              </span>
            </div>
        </div>
    </nav>
  <section class="container my-account-section">
    <div class="row align-items-start">
      <div class="col-md-6 text-center">
        <div class="account-image-wrapper">
          <img src="assets/img/foodbank.jpg" alt="Food Bank" class="account-bank-image">
        </div>

        <div class="account-button-row">
          <button class="account-action-btn">Bank Inventory</button>
        </div>
      </div>

      <div class="col-md-6">
        <div class="bank-name-box">Regina Food Bank</div>
        <div class="bank-description-box">
          Description here
        </div>
      </div>
    </div>

    <div class="account-info-panel mt-5">

      <div class="account-field-group">
        <label class="account-label">Address:</label>
        <div class="account-display-box editable-field" id="address-wrapper" data-value="123 Street">
          <span class="field-text">123 Regina Street, SK</span>
          <button class="edit-icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16">
              <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293z"/>
              <path d="M13.752 3.396l-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
              <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="account-field-group">
        <label class="account-label">Contact(s):</label>
        <div class="account-display-box editable-field" id="contacts-wrapper" data-value="306-555-0199">
          <span class="field-text">306-555-0199</span>
          <button class="edit-icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16">
              <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293z"/>
              <path d="M13.752 3.396l-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
              <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="account-field-group">
        <label class="account-label">Organization:</label>
        <div class="account-display-box editable-field" id="organization-wrapper" data-value="PantriHub Community Network">
          <span class="field-text">PantriHub Community Network</span>
          <button class="edit-icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-pencil-square" viewBox="0 0 16 16">
              <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293z"/>
              <path d="M13.752 3.396l-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
              <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
