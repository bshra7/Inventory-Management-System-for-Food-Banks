<!DOCTYPE html>
<html>
<head>
  <title>Add Item</title>
</head>
<body>
  <h1>Add Item</h1>
  <form action="/add-item" method="POST">
    <label>Name: <input type="text" name="name" required></label><br>
    <label>Quantity: <input type="number" name="quantity" required></label><br>
    <label>Unit: <input type="text" name="unit" required></label><br>
    <label>Category: <input type="text" name="category" required></label><br>
    <label>Expiry: <input type="date" name="expiry" required></label><br>
    <label>Status: <input type="text" name="status" required></label><br>
    <button type="submit">Add Item</button>
  </form>
</body>
</html>
