<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PantriHub - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

    <div class="container mt-5">
        <div class="row my-wrapper shadow-lg rounded-4 overflow-hidden">

            <div class="col-md-6 my-left-panel d-flex align-items-center justify-content-center text-center">
                <div class="p-4 text-white">
                    <h1>Create Your Account</h1>
                    <p>Sign up to connect your organization, manage inventory, and support your community.</p>
                </div>
            </div>

            <div class="col-md-6 my-right-panel d-flex align-items-center justify-content-center">
                <div class="my-form-card w-100">
                    <h2 class="my-form-title text-center mb-3">Sign Up</h2>

                    <div id="error-msg" class="alert alert-danger d-none" role="alert"></div>

                    <form id="register-form">
                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" name="name" class="form-control my-custom-input" placeholder="Enter your name" required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control my-custom-input" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label>Organization / Food Bank</label>
                            <input type="text" name="organization" class="form-control my-custom-input" placeholder="e.g. Regina Food Bank">
                        </div>

                        <div class="mb-3">
                            <label>Location / Address</label>
                            <input type="text" name="address" class="form-control my-custom-input" placeholder="e.g. 445 Winnipeg Street, Regina, SK">
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control my-custom-input" placeholder="Enter password" required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label>Confirm Password</label>
                            <input type="password" name="confirmPassword" class="form-control my-custom-input" placeholder="Confirm password" required>
                        </div>

                        <button type="submit" class="btn custom-btn-green w-100 mb-3">Sign Up</button>

                        <p class="text-center">
                            Already have an account?
                            <a href="signin.html" class="my-link">Sign in</a>
                        </p>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errEl = document.getElementById("error-msg");
            errEl.classList.add("d-none");

            const form = e.target;
            const name = form.name.value.trim();
            const email = form.email.value.trim();
            const organization = form.organization.value.trim();
            const address = form.address.value.trim();
            const password = form.password.value;
            const confirmPassword = form.confirmPassword.value;

            if (password !== confirmPassword) {
                errEl.textContent = "Passwords do not match";
                errEl.classList.remove("d-none");
                return;
            }

            try {
                const res = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password, organization, address }),
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = "/home.html";
                } else {
                    errEl.textContent = data.error;
                    errEl.classList.remove("d-none");
                }
            } catch (err) {
                errEl.textContent = "Connection error. Is the server running?";
                errEl.classList.remove("d-none");
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
