<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PantriHub - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

    <div class="container mt-5">
        <div class="row my-wrapper shadow-lg rounded-4 overflow-hidden">

            <div class="col-md-6 my-left-panel d-flex align-items-center justify-content-center text-center">
                <div class="p-4 text-white">
                    <h1>Reset Password</h1>
                    <p>Enter your email address and choose a new password.</p>
                </div>
            </div>

            <div class="col-md-6 my-right-panel d-flex align-items-center justify-content-center">
                <div class="my-form-card w-100">
                    <h2 class="my-form-title text-center mb-3">Reset Password</h2>

                    <div id="error-msg" class="alert alert-danger d-none" role="alert"></div>
                    <div id="success-msg" class="alert alert-success d-none" role="alert"></div>

                    <form id="reset-form">
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control my-custom-input" placeholder="Enter your registered email" required>
                        </div>

                        <div class="mb-3">
                            <label>New Password</label>
                            <input type="password" name="newPassword" class="form-control my-custom-input" placeholder="Enter new password" required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label>Confirm New Password</label>
                            <input type="password" name="confirmPassword" class="form-control my-custom-input" placeholder="Confirm new password" required>
                        </div>

                        <button type="submit" class="btn custom-btn-green w-100 mb-3">Reset Password</button>

                        <p class="text-center">
                            <a href="signin.html" class="my-link">Back to Sign In</a>
                        </p>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.getElementById("reset-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errEl = document.getElementById("error-msg");
            const successEl = document.getElementById("success-msg");
            errEl.classList.add("d-none");
            successEl.classList.add("d-none");

            const form = e.target;
            const email = form.email.value.trim();
            const newPassword = form.newPassword.value;
            const confirmPassword = form.confirmPassword.value;

            if (newPassword !== confirmPassword) {
                errEl.textContent = "Passwords do not match";
                errEl.classList.remove("d-none");
                return;
            }

            try {
                const res = await fetch("/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, newPassword }),
                });
                const data = await res.json();
                if (res.ok) {
                    successEl.textContent = "Password reset successful! Redirecting to sign in...";
                    successEl.classList.remove("d-none");
                    setTimeout(() => { window.location.href = "/signin.html"; }, 2000);
                } else {
                    errEl.textContent = data.error;
                    errEl.classList.remove("d-none");
                }
            } catch (err) {
                errEl.textContent = "Connection error. Is the server running?";
                errEl.classList.remove("d-none");
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
